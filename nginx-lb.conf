events {
    worker_connections 1024;
}

http {
    # Your gateway running on port 8080
    upstream llm_gateway {
        server 127.0.0.1:8080;
        keepalive 32;
    }

    server {
        listen 80;

        # Main proxy — forwards all requests to gateway
        location / {
            proxy_pass http://llm_gateway;
            proxy_http_version 1.1;

            # Pass original headers through
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Critical for SSE streaming — disables buffering
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection '';
            chunked_transfer_encoding on;

            # Long enough for Modal cold start + 303 result polling + inference.
            # Modal returns a 303 every ~150s during cold start; each redirect leg counts against
            # proxy_read_timeout. With 12 legs × 150s = 1800s, set timeouts well above that.
            proxy_connect_timeout  60s;
            proxy_send_timeout    1800s;
            proxy_read_timeout    1800s;
        }
    }
}