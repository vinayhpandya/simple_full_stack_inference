events {
    worker_connections 1024;
}

http {
    # Your gateway running on port 8080
    upstream llm_gateway {
        server 127.0.0.1:8080;
        keepalive 32;
    }

    server {
        listen 80;

        # Main proxy — forwards all requests to gateway
        location / {
            proxy_pass http://llm_gateway;
            proxy_http_version 1.1;

            # Pass original headers through
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Critical for SSE streaming — disables buffering
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection '';
            chunked_transfer_encoding on;

            # Timeouts — must be long for LLM responses
            proxy_connect_timeout 10s;
            proxy_send_timeout    180s;
            proxy_read_timeout    180s;
        }
    }
}