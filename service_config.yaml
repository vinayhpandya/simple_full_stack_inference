name: deepseek-v2-lite-disagg-pd

cloud: "Anyscale Cloud"

image_uri: anyscale/ray-llm:2.54.1-py311-cu128

compute_config:
  head_node:
    instance_type: m5.2xlarge
  worker_nodes:
    - instance_type: g5.12xlarge
      min_nodes: 1
      max_nodes: 1

env_vars:
  MODEL_ID: "deepseek-ai/DeepSeek-V2-Lite"
  HF_TOKEN: ""

working_dir: "."

applications:
  - name: deepseek-moe-app
    import_path: deployment:app

http_options:
  request_timeout_s: 300